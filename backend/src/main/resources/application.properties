spring.data.mongodb.uri=${MONGO_URI:mongodb://admin:password@localhost:27017/foodplatform?authSource=admin}
spring.data.mongodb.database=${MONGO_DB:foodplatform}
spring.data.mongodb.auto-index-creation=true
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-food-platform-app}
jwt.expiration=86400000
server.port=8080
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
